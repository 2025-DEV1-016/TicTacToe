openapi: 3.0.3

info:
  title: TicTacToe API
  version: 1.0.0
  description: REST API for TicTacToe game

servers:
  - url: http://localhost:8080

paths:

  /games:
    post:
      summary: Create a new game
      operationId: createGame
      responses:
        '200':
          description: Game created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'

  /games/{gameId}:
    get:
      summary: Get game state
      operationId: getGame
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/moves:
    post:
      summary: Make a move
      operationId: makeMove
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveRequest'
      responses:
        '200':
          description: Move successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          description: Invalid move or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Game already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/reset:
    post:
      summary: Reset an existing game
      operationId: resetGame
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  schemas:

    MoveRequest:
      type: object
      required:
        - position
      properties:
        position:
          type: integer
          minimum: 0
          maximum: 8
          example: 4
          description: Board position (0-8)

    GameResponse:
      type: object
      required:
        - gameId
        - board
        - currentPlayer
        - status
      properties:
        gameId:
          type: string
          example: "123e4567-e89b-12d3-a456-426614174000"

        board:
          type: array
          items:
            type: string
            enum: ["X", "O", "-"]
          example: ["X","O","-","-","X","-","O","-","-"]

        currentPlayer:
          type: string
          enum: ["X", "O"]

        status:
          type: string
          enum: ["IN_PROGRESS", "WIN", "DRAW"]

    ErrorResponse:
      type: object
      required:
        - status
        - errorDetail
      properties:

        status:
          type: integer
          example: 400

        errorDetail:
          type: string
          example: "Cell occupied"

        extraErrorData:
          type: array
          items:
            type: string